<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Luna Jinger Portfolio</title>
  <!-- Google Fonts for elegant cursive -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #cce7f5;
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 20px;
      margin: 0;
    }

    nav a {
      text-decoration: none;
      font-weight: bold;
      color: #333;
    }

    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 3.5em;
      margin-top: 50px;
    }

    .icons img {
      width: 70px;
      margin: 20px;
    }

    .motto {
      font-weight: bold;
      text-transform: uppercase;
      margin-top: 40px;
      padding: 0 20px;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <header>
    <nav>
      <ul>
        <li><a href="#story">My Story</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#collaborations">Collaborations</a></li>
        <li><a href="#press">Press</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Section -->
  <main>
    <h1 class="logo">Luna Jinger</h1>
    <div class="icons">
      <img src="https://github.com/priyadharshinimani46-sjpp/Portfolio/blob/main/arrow.png" alt="Arrow Icon">
      <img src="images/flame.png" alt="Flame Icon">
      <img src="images/star.png" alt="Star Icon">
    </div>
    <p class="motto">
      BE BOLD. BE STRONG. BE DIFFERENT. THIS IS THE MOTTO I LIVE BY EVERY DAY. 
      AS A DIGITAL DESIGNER, I STRIVE FOR THE SAME, AND I TRY TO REFLECT IN EVERY PROJECT I TAKE ON, 
      REGARDLESS OF HOW BIG OR SMALL IT MIGHT BE.
    </p>
  </main>
</body>
</html>
